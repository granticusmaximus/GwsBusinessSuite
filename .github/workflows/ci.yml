name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GwsBusinessSuite.slnx

      - name: Build
        run: dotnet build GwsBusinessSuite.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/GwsBusinessSuite.Tests/GwsBusinessSuite.Tests.csproj --no-build -c Release

  public-site:
    name: Public Site Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/public-site

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/public-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
