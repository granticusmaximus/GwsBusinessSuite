name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GwsBusinessSuite.slnx

      - name: Build
        run: dotnet build GwsBusinessSuite.slnx --no-restore -c Release

      - name: Install Playwright Chromium
        run: pwsh tests/GwsBusinessSuite.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Test
        run: dotnet test tests/GwsBusinessSuite.Tests/GwsBusinessSuite.Tests.csproj --no-build -c Release
