name: Native Clients

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/GwsBusinessSuite.App/**"
      - "src/GwsBusinessSuite.Linux/**"
      - ".github/workflows/clients.yml"

jobs:
  android:
    name: Android MAUI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet workload install maui
      - run: dotnet restore src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj
      - run: dotnet build src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj -f net10.0-android -c Release --no-restore

  apple:
    name: Apple MAUI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet workload install maui
      - run: dotnet restore src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj
      - run: dotnet build src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj -f net10.0-maccatalyst -c Release --no-restore
      - run: dotnet build src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj -f net10.0-ios -c Release --no-restore -p:RuntimeIdentifier=iossimulator-arm64

  windows:
    name: Windows MAUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet workload install maui
      - run: dotnet restore src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj
      - run: dotnet build src/GwsBusinessSuite.App/GwsBusinessSuite.App.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore

  linux:
    name: Linux Electron
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/GwsBusinessSuite.Linux
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/GwsBusinessSuite.Linux/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: node --check main.cjs
      - run: npm exec electron-builder -- --linux dir
