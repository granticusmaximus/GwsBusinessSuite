name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GwsBusinessSuite.slnx

      - name: Build
        run: dotnet build GwsBusinessSuite.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/GwsBusinessSuite.Tests/GwsBusinessSuite.Tests.csproj --no-build -c Release

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH into droplet and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/gwssuite

            # First-time clone if directory doesn't exist
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/granticusmaximus/GwsBusinessSuite.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Rebuild and restart with zero-downtime swap
            docker compose pull --quiet || true
            if grep -qE '^TURN_SHARED_SECRET=.{32,}$' .env 2>/dev/null && grep -qE '^TURN_URL_UDP=turn:' .env 2>/dev/null; then
              echo "TURN configuration found; deploying the coturn relay."
              docker compose -f docker-compose.yml -f docker-compose.turn.yml up -d --build --remove-orphans
            else
              echo "TURN configuration not found; deploying with STUN/direct connectivity only."
              docker compose up -d --build --remove-orphans
            fi

            # Smoke test: a container reporting "up" doesn't mean the app inside it is
            # actually serving traffic (DB migration failures, a bad config value, etc.
            # all start the container and then crash or hang silently). Poll /health
            # before declaring the deploy successful, so a broken release fails the
            # GitHub Actions run instead of going unnoticed until a user hits an error.
            echo "Waiting for the app to report healthy..."
            for i in $(seq 1 24); do
              status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || echo "000")
              if [ "$status" = "200" ]; then
                echo "Health check passed (HTTP $status)."
                break
              fi
              if [ "$i" = "24" ]; then
                echo "Health check failed after deploy (last status: HTTP $status)."
                docker compose logs --tail=100 gwssuite
                exit 1
              fi
              sleep 5
            done

            # Clean up dangling images to save disk space
            docker image prune -f
