name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GwsBusinessSuite.slnx

      - name: Build
        run: dotnet build GwsBusinessSuite.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/GwsBusinessSuite.Tests/GwsBusinessSuite.Tests.csproj --no-build -c Release

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH into droplet and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/gwssuite

            # First-time clone if directory doesn't exist
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/granticusmaximus/GwsBusinessSuite.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Rebuild and restart with zero-downtime swap
            docker compose pull --quiet || true
            docker compose up -d --build --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
