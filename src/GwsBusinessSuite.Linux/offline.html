<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GWS Business Suite</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #141210;
      color: #fafaf9;
    }
    * { box-sizing: border-box; }
    body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: 1.5rem; background: #141210; }
    main { width: min(30rem, 100%); padding: 1.75rem; border: 1px solid #292524; border-radius: 12px; background: #1c1917; box-shadow: 0 18px 50px #00000038; }
    .mark { display: grid; place-items: center; width: 2.65rem; height: 2.65rem; margin-bottom: 1rem; border: 1px solid #66501f; border-radius: 10px; background: #2b2215; color: #fbbf24; font: 800 1.1rem Georgia, serif; }
    .eyebrow { margin: 0 0 .35rem; color: #f59e0b; font-size: .68rem; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }
    h1 { margin: 0; color: #fafaf9; font-size: 1.4rem; line-height: 1.25; letter-spacing: -.02em; }
    p { margin: .8rem 0 1.25rem; color: #a8a29e; line-height: 1.55; }
    button { min-height: 2.75rem; border: 0; border-radius: 8px; padding: .7rem 1.1rem; background: #f59e0b; color: #1c1917; font: 700 .9rem inherit; cursor: pointer; }
    button:hover { background: #fbbf24; }
    button:focus-visible { outline: 3px solid #66501f; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">S</div>
    <p class="eyebrow">GWS Business Suite</p>
    <h1>Sentinel is temporarily unavailable</h1>
    <p id="message">Check your internet connection and confirm that the GWS server is running.</p>
    <button id="retry" type="button">Reconnect</button>
  </main>
  <script>
    const parameters = new URLSearchParams(location.search);
    const message = parameters.get('message');
    const retry = parameters.get('retry');
    if (message) document.querySelector('#message').textContent = message;
    document.querySelector('#retry').addEventListener('click', () => {
      if (retry) location.href = retry;
    });
  </script>
</body>
</html>
