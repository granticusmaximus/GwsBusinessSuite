services:
  gwssuite:
    build: .
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: always
    volumes:
      # Persist SQLite database and any local CMS file state
      - gwssuite-data:/app/data

volumes:
  gwssuite-data:
