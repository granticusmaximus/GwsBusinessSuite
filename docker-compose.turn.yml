services:
  turn:
    image: coturn/coturn:4.14.0-r0
    restart: always
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    environment:
      DETECT_EXTERNAL_IP: "yes"
    command:
      - --no-config
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET:?TURN_SHARED_SECRET must be set for coturn}
      - --realm=${TURN_REALM:-gws-live}
      - --min-port=49160
      - --max-port=49200
      - --no-multicast-peers
      - --no-cli
